trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  imageRepository: time-tracker
  dockerRegistry: timetrackeracr2026.azurecr.io
  dockerfilePath: Dockerfile
  tag: $(Build.BuildId)

stages:

# =====================================================
# Stage 1 - Build Docker Image & Push to ACR
# =====================================================

- stage: Build
  displayName: Build and Push Image

  jobs:
  - job: Build

    steps:

    - checkout: self

    - task: Docker@2
      displayName: Build Docker Image

      inputs:
        command: build
        containerRegistry: docker-acr-sc
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        tags: |
          $(tag)

    - task: Docker@2
      displayName: Push Docker Image

      inputs:
        command: push
        containerRegistry: docker-acr-sc
        repository: $(imageRepository)
        tags: |
          $(tag)

# =====================================================
# Stage 2 - Deploy to AKS
# =====================================================

- stage: Deploy
  displayName: Deploy to AKS

  dependsOn: Build

  jobs:

  - job: Deploy

    steps:

    - checkout: self

    - task: KubernetesManifest@1
      displayName: Deploy Application

      inputs:
        action: deploy

        kubernetesServiceConnection: aks-sc

        manifests: |
          k8s/deployment.yaml
          k8s/service.yaml

        containers: |
          timetrackeracr2026.azurecr.io/time-tracker:$(Build.BuildId)
